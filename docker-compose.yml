version: '3.8'

services:
  360router:
    build: .
    image: 360opsai/360router:latest
    container_name: 360router
    ports:
      - "3600:3600"
    volumes:
      # Mount host config so 'docker exec 360router 360router init' persists
      - router-config:/config
    environment:
      # Override port if needed
      - ROUTER_PORT=3600
    restart: unless-stopped
    # Access host network for local LLMs (Ollama on host:11434)
    # Uncomment if your LLMs run on the host machine:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3600/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  router-config:
